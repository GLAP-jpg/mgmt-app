<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理職サポートAI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f5f3;
  --surface:#ffffff;
  --surface-2:#eaf0ed;
  --surface-3:#e0ebe5;
  --border:#c6d8ce;
  --border-strong:#9abcab;
  --text-1:#1a2e24;
  --text-2:#3d5c4a;
  --text-3:#7a9d8a;
  --accent:#2d6e52;
  --accent-light:#daeee4;
  --accent-dark:#1a4a34;
  --accent-mid:#3d8c68;
  --teal:#1a7a7a;
  --teal-light:#d4f0f0;
  --slate:#4a5e6e;
  --slate-light:#dde6ed;
  --gold:#b07020;
  --gold-light:#faf0dc;
  --amber:#c87a10;
  --amber-light:#fef3d8;
  --red:#c03040;
  --red-light:#fde8ea;
  --purple:#5a3a8a;
  --purple-light:#ede6f8;
  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:18px;
  --shadow:0 1px 4px rgba(26,46,36,.06),0 4px 16px rgba(26,46,36,.06);
  --shadow-md:0 2px 8px rgba(26,46,36,.08),0 8px 24px rgba(26,46,36,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg)}
body{font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;color:var(--text-1);-webkit-font-smoothing:antialiased}
.app{max-width:880px;margin:0 auto;padding:0 1.25rem 3rem}

/* header */
.header{text-align:center;padding:2.75rem 1rem 2rem;position:relative}
.header-stripe{position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--accent) 0%,var(--teal) 33%,var(--slate) 66%,var(--gold) 100%)}
.header .icon-badge{width:58px;height:58px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 1.1rem;box-shadow:0 4px 16px rgba(45,110,82,.28)}
.header .icon-badge i{font-size:28px;color:#fff}
.header h1{font-size:25px;font-weight:800;letter-spacing:-.025em;margin-bottom:7px;color:var(--accent-dark)}
.header p{font-size:13.5px;color:var(--text-2);line-height:1.6}

/* tabs */
.mode-tabs{display:flex;gap:5px;margin-bottom:1.75rem;background:var(--surface-2);padding:5px;border-radius:var(--radius-lg);border:1px solid var(--border)}
.tab{flex:1;padding:10px 6px;border:none;border-radius:10px;background:transparent;font-size:13px;font-weight:500;cursor:pointer;text-align:center;color:var(--text-2);transition:all .18s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.tab i{font-size:16px}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(45,110,82,.28);font-weight:700}
.tab:hover:not(.active){background:var(--accent-light);color:var(--accent-dark)}
.panel{display:none}
.panel.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* chat mode toggle */
.chat-mode-toggle{display:flex;gap:8px;margin-bottom:14px}
.mode-toggle-btn{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-md);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-2);transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px}
.mode-toggle-btn i{font-size:15px}
.mode-toggle-btn:hover:not(.active){background:var(--surface-2);border-color:var(--border-strong)}
.mode-toggle-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 10px rgba(45,110,82,.22)}
.mode-toggle-btn#btn-roumu.active{background:var(--teal);border-color:var(--teal);box-shadow:0 2px 10px rgba(26,122,122,.22)}

/* chat */
.chat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em}
.section-label i{font-size:14px}
.reset-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border:1px solid var(--border);border-radius:20px;background:var(--surface);font-size:12px;color:var(--text-2);cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500}
.reset-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-light)}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:8px;margin-bottom:1.25rem}
.quick-btn{display:flex;align-items:center;gap:9px;padding:11px 12px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text-1);font-family:inherit;text-align:left;transition:all .18s;line-height:1.4}
.quick-btn:hover{border-color:var(--accent-mid);background:var(--accent-light);transform:translateY(-1px);box-shadow:var(--shadow)}
.quick-btn .qicon{flex-shrink:0;width:30px;height:30px;border-radius:9px;background:var(--accent-light);color:var(--accent-dark);display:flex;align-items:center;justify-content:center;font-size:14px}
.chat-box{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);box-shadow:var(--shadow-md)}
.messages{height:520px;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.msg{display:flex;gap:9px;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{flex-shrink:0;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.msg.ai .msg-avatar{background:var(--accent);color:#fff}
.msg.user .msg-avatar{background:var(--slate);color:#fff}
.msg-bubble{padding:11px 15px;border-radius:var(--radius-md);font-size:14px;line-height:1.75}
.msg.user .msg-bubble{background:var(--accent);color:#fff;border-top-right-radius:4px}
.msg.ai .msg-bubble{background:var(--surface-2);color:var(--text-1);border-top-left-radius:4px;border:1px solid var(--border)}
.msg.loading .msg-bubble{color:var(--text-3);font-style:italic;display:flex;align-items:center;gap:8px}
.dot-flash{display:inline-flex;gap:3px}
.dot-flash span{width:5px;height:5px;border-radius:50%;background:var(--accent-mid);animation:dotflash 1.2s infinite ease-in-out}
.dot-flash span:nth-child(2){animation-delay:.2s}
.dot-flash span:nth-child(3){animation-delay:.4s}
@keyframes dotflash{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:var(--surface-2)}
.chat-input-row input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:14px;background:var(--surface);font-family:inherit;color:var(--text-1);transition:all .15s}
.chat-input-row input:focus{outline:none;border-color:var(--accent-mid);box-shadow:0 0 0 3px rgba(61,140,104,.12)}
.chat-input-row input::placeholder{color:var(--text-3)}
.send-btn{border-radius:var(--radius-md);border:none;background:var(--accent);cursor:pointer;display:flex;align-items:center;color:#fff;font-size:13px;font-weight:700;transition:all .15s;flex-shrink:0;padding:0 18px;gap:6px;font-family:inherit;height:44px;box-shadow:0 2px 8px rgba(45,110,82,.24)}
.send-btn:hover{background:var(--accent-dark);box-shadow:0 3px 12px rgba(45,110,82,.32)}

/* test */
.cat-select-wrap{position:relative;margin-bottom:10px}
.cat-select{width:100%;padding:11px 38px 11px 14px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);font-size:14px;font-family:inherit;color:var(--text-1);appearance:none;cursor:pointer}
.cat-select:focus{outline:none;border-color:var(--accent-mid)}
.cat-select-wrap::after{content:"\ea5f";font-family:'tabler-icons';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;font-size:15px}
.gen-test-btn{width:100%;padding:12px;border:none;border-radius:var(--radius-md);background:var(--teal);cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;color:#fff;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;box-shadow:0 2px 10px rgba(26,122,122,.22)}
.gen-test-btn:hover{background:#145f5f;box-shadow:0 3px 14px rgba(26,122,122,.32)}
.test-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.test-cat-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--teal);background:var(--teal-light);padding:5px 12px;border-radius:20px;margin-bottom:12px}
.test-q{font-size:15.5px;font-weight:600;margin-bottom:1.1rem;line-height:1.65;color:var(--text-1)}
.test-options{display:flex;flex-direction:column;gap:8px}
.test-opt{display:flex;align-items:center;gap:11px;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;font-size:14px;background:var(--surface);text-align:left;transition:all .15s;font-family:inherit;color:var(--text-1)}
.test-opt:hover{background:var(--teal-light);border-color:var(--teal)}
.opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-2);border:1px solid var(--border)}
.test-opt.correct{border-color:var(--accent);background:var(--accent-light);color:var(--accent-dark)}
.test-opt.correct .opt-letter{background:var(--accent);color:#fff;border-color:transparent}
.test-opt.wrong{border-color:var(--red);background:var(--red-light);color:#8a1828}
.test-opt.wrong .opt-letter{background:var(--red);color:#fff;border-color:transparent}
.explanation{margin-top:14px;padding:13px 15px;background:var(--amber-light);border:1px solid #e8c870;border-radius:var(--radius-md);font-size:13px;color:var(--text-1);line-height:1.75;display:flex;gap:9px}
.explanation i{color:var(--amber);font-size:17px;flex-shrink:0;margin-top:1px}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--slate-light);border:1px solid #c0cdd6;border-radius:var(--radius-md);margin-bottom:1rem}
.score-label{font-size:13px;color:var(--slate);display:flex;align-items:center;gap:5px;font-weight:600}
.score-val{font-size:20px;font-weight:800;color:var(--slate)}
.next-btn{width:100%;padding:11px;margin-top:10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);cursor:pointer;font-size:14px;font-weight:500;color:var(--text-1);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.next-btn:hover{background:var(--surface-2);border-color:var(--border-strong)}

/* stats */
.stats-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)}
.stat-card-title{font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stat-card-title i{font-size:15px;color:var(--teal)}
.stat-cat-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.stat-cat-name{flex:1;font-size:12.5px;color:var(--text-1)}
.stat-bar-wrap{width:80px;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.stat-bar{height:6px;background:var(--teal);border-radius:3px;transition:width .5s ease}
.stat-pct{font-size:11.5px;color:var(--teal);width:34px;text-align:right;font-weight:700}
.weak-list{display:flex;flex-direction:column;gap:6px}
.weak-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--red-light);border:1px solid #f0b8be;border-radius:10px;font-size:12.5px;color:#7a1828}
.weak-item .weak-no{flex-shrink:0;width:24px;height:24px;border-radius:6px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.weak-retry-btn{margin-left:auto;padding:4px 10px;border:1px solid var(--red);border-radius:12px;background:var(--surface);font-size:11.5px;color:var(--red);cursor:pointer;font-family:inherit;transition:all .15s;font-weight:600}
.weak-retry-btn:hover{background:var(--red);color:#fff}
.no-data{text-align:center;padding:1.5rem;color:var(--text-3);font-size:13px}

/* check */
.check-intro{display:flex;gap:11px;align-items:flex-start;padding:13px 16px;background:var(--teal-light);border:1px solid #a0d4d4;border-radius:var(--radius-md);margin-bottom:1.25rem;font-size:13px;color:var(--teal);line-height:1.7}
.check-intro i{font-size:17px;margin-top:1px;flex-shrink:0}
.check-section{margin-bottom:1.5rem}
.check-section-title{font-size:13.5px;font-weight:700;color:var(--text-1);padding:0 0 9px;border-bottom:2.5px solid var(--accent);margin-bottom:10px;display:inline-block}
.check-item{display:flex;align-items:center;gap:13px;padding:10px 12px;border-radius:var(--radius-md);transition:background .15s}
.check-item:hover{background:var(--surface-2)}
.check-text{flex:1;font-size:13px;line-height:1.6;color:var(--text-1)}
.check-stars{display:flex;gap:4px;flex-shrink:0}
.star{width:28px;height:28px;border:1px solid var(--border);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-3);background:var(--surface);transition:all .12s}
.star:hover{border-color:var(--gold);color:var(--gold)}
.star.on{background:var(--gold);border-color:var(--gold);color:#fff;box-shadow:0 1px 6px rgba(176,112,32,.3)}
.check-total-card{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;background:var(--accent);border-radius:var(--radius-lg);margin:1.25rem 0;box-shadow:0 3px 14px rgba(45,110,82,.24)}
.check-total-label{font-size:13px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:7px;font-weight:600}
.check-total-val{font-size:24px;font-weight:800;color:#fff}
.check-total-val span{font-size:13px;font-weight:500;color:rgba(255,255,255,.7)}
.analyze-btn{width:100%;padding:12px;border:none;border-radius:var(--radius-md);background:var(--purple);cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;color:#fff;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;box-shadow:0 2px 10px rgba(90,58,138,.22)}
.analyze-btn:hover{background:#47277a;box-shadow:0 3px 14px rgba(90,58,138,.32)}
.check-result-card{padding:1.4rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-top:1.25rem;box-shadow:var(--shadow)}
.check-result-title{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;margin-bottom:10px;color:var(--purple)}
.save-check-btn{width:100%;padding:11px;border:1.5px solid var(--teal);border-radius:var(--radius-md);background:var(--teal-light);cursor:pointer;font-size:13.5px;font-weight:700;font-family:inherit;color:var(--teal);margin-top:.75rem;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.save-check-btn:hover{background:var(--teal);color:#fff;box-shadow:0 2px 10px rgba(26,122,122,.22)}

/* trend */
.trend-section{margin-top:1.75rem}
.trend-title{font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.trend-chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem;overflow-x:auto}
.trend-bar-group{display:flex;align-items:flex-end;gap:6px;min-height:120px;margin-bottom:4px}
.trend-bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:40px}
.trend-bar{width:100%;border-radius:5px 5px 0 0;transition:height .4s ease}
.trend-bar-val{font-size:10px;font-weight:700;color:var(--accent-dark)}
.trend-bar-date{font-size:10px;color:var(--text-3);white-space:nowrap}
.trend-cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-top:10px}
.trend-cat-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-1)}
.trend-cat-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trend-delta{font-size:11px;font-weight:700}
.trend-delta.up{color:var(--accent)}
.trend-delta.down{color:var(--red)}
.trend-delta.same{color:var(--text-3)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-stripe"></div>
    <div class="icon-badge"><i class="ti ti-target-arrow"></i></div>
    <h1>管理職サポートAI</h1>
    <p>管理職の「どうする？」をAIが一緒に考えます</p>
  </div>

  <div class="mode-tabs">
    <button class="tab active" onclick="switchTab('consult',this)"><i class="ti ti-message-circle"></i>AI相談</button>
    <button class="tab" onclick="switchTab('test',this)"><i class="ti ti-clipboard-check"></i>テスト</button>
    <button class="tab" onclick="switchTab('check',this)"><i class="ti ti-checklist"></i>心得チェック</button>
  </div>

  <!-- AI相談 -->
  <div id="consult" class="panel active">
    <div class="chat-mode-toggle">
      <button class="mode-toggle-btn active" id="btn-mgmt" onclick="setChatMode('mgmt')"><i class="ti ti-target-arrow"></i>マネジメント相談</button>
      <button class="mode-toggle-btn" id="btn-roumu" onclick="setChatMode('roumu')"><i class="ti ti-building-community"></i>部長・課長×人事　役割確認</button>
    </div>
    <div class="chat-header">
      <div class="section-label" id="quick-label"><i class="ti ti-bulb"></i>よくある質問</div>
      <button class="reset-btn" onclick="resetChat()"><i class="ti ti-refresh"></i>履歴をリセット</button>
    </div>
    <div id="quick-grid-mgmt" class="quick-grid">
      <button class="quick-btn" onclick="quickAsk('コーチングとフィードバックの違いを教えてください')"><span class="qicon"><i class="ti ti-arrows-diff"></i></span>コーチングとフィードバックの違い</button>
      <button class="quick-btn" onclick="quickAsk('GPKaとは何ですか？どう使いますか？')"><span class="qicon"><i class="ti ti-route"></i></span>GPKaの使い方</button>
      <button class="quick-btn" onclick="quickAsk('権限委譲でよくある失敗パターンは？')"><span class="qicon"><i class="ti ti-alert-triangle"></i></span>権限委譲の失敗</button>
      <button class="quick-btn" onclick="quickAsk('メンバーのWillをどうやって引き出せばいい？')"><span class="qicon"><i class="ti ti-compass"></i></span>Willの引き出し方</button>
      <button class="quick-btn" onclick="quickAsk('野心的な目標設定の具体的な方法を教えてください')"><span class="qicon"><i class="ti ti-flag"></i></span>野心的な目標設定</button>
      <button class="quick-btn" onclick="quickAsk('チームのモメンタムを高める方法は？')"><span class="qicon"><i class="ti ti-trending-up"></i></span>モメンタムの高め方</button>
    </div>
    <div id="quick-grid-roumu" class="quick-grid" style="display:none">
      <button class="quick-btn" onclick="quickAsk('部下が7営業日以上連絡が取れない場合、私はどう動けばいいですか？')"><span class="qicon"><i class="ti ti-user-off"></i></span>部下が音信不通になった</button>
      <button class="quick-btn" onclick="quickAsk('部下が「辞めたい」と言ってきました。私はどう対応すればいいですか？')"><span class="qicon"><i class="ti ti-door-exit"></i></span>部下が退職したいと言ってきた</button>
      <button class="quick-btn" onclick="quickAsk('部下が体調不良・メンタル不調で休みがちです。休職の手続きはどう進めればいいですか？')"><span class="qicon"><i class="ti ti-heart-off"></i></span>部下の休職手続きについて</button>
      <button class="quick-btn" onclick="quickAsk('部下の遅刻・欠勤が続いています。私が対応すべきことと、人事に相談すべきことを教えてください')"><span class="qicon"><i class="ti ti-clock-off"></i></span>遅刻・欠勤が続く部下への対応</button>
    </div>
    <div class="chat-box">
      <div class="messages" id="chat-messages">
        <div class="msg ai">
          <div class="msg-avatar"><i class="ti ti-target-arrow"></i></div>

  "見られている自覚": ["あなたはメンバーに見られているという自覚と行動をするべきであると心得ているか", "メンバーの前で会社や上司の陰口を言わないということを心得ているか", "1つ1つの言葉に細心の注意をということを心得ているか"],
  "自己成長に務める": ["自分・チームの発展のためどんなことも他責にせず自責を問うということを心得ているか", "自分が成長角度でNo1であるべきということを心得ているか"],
  "メンバーを「がっかり」させない": ["どんな提案もまずはノリよく受け止めてみることから始めるということを心得ているか", "過去の栄光にしがみついていては誰もついてこないということを心得ているか", "任せるというのは慎重に熟慮を重ねて言うべきであるということを心得ているか"],
  "自分を知り自分に勝つ": ["自分についてのwhyを理解すべきということを心得ているか", "仕事と人生の判断を分けるということを心得ているか"],
  "メンバーに向き合う": ["敬意と感謝をもち、わかるまでしつこく聞くということを心得ているか", "相手の立場になり、分かり合うということを心得ているか", "メンバーに対し、見返りを求めず与え続けるということを心得ているか"]
};

const checkItemsList = Object.entries(checkItems).map(([cat, items]) => ({ cat, items }));
const totalItems = checkItemsList.reduce((s, g) => s + g.items.length, 0);

// ── state ──
let chatHistory = [];
let currentTest = null;
let answered = false;
let score = 0;
let total = 0;
let checkData = {};
let testStats = JSON.parse(localStorage.getItem('mgmt_test_stats') || '{}');
let weakCards = JSON.parse(localStorage.getItem('mgmt_weak_cards') || '[]');
let checkHistory = JSON.parse(localStorage.getItem('mgmt_check_history') || '[]');

// ── utils ──
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(tab).classList.add('active');
  if (tab === 'check' && !document.getElementById('check-area').innerHTML) renderCheckSheet();
  if (tab === 'test') renderTestStats();
}

async function callClaude(messages, system) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, system, messages })
  });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch(e) { throw new Error('サーバーエラー: ' + text.slice(0, 200)); }
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data.content[0].text;
}

// ── chat ──
function addMessage(text, role) {
  const box = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const icon = role === 'user' ? 'ti-user' : 'ti-target-arrow';
  if (role.includes('loading')) {
    wrap.innerHTML = `<div class="msg-avatar" style="background:var(--accent);color:#fff;"><i class="ti ti-target-arrow"></i></div><div class="msg-bubble">考え中<span class="dot-flash"><span></span><span></span><span></span></span></div>`;
  } else {
    wrap.innerHTML = `<div class="msg-avatar"><i class="ti ${icon}"></i></div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  }
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
  return wrap;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  chatHistory.push({ role: 'user', content: text });
  const loading = addMessage('', 'loading ai');
  try {
    const reply = await callClaude(chatHistory, getCurrentPrompt());
    loading.remove();
    addMessage(reply, 'ai');
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    loading.remove();
    addMessage('エラー: ' + e.message, 'ai');
  }
}

function quickAsk(text) {
  document.getElementById('chat-input').value = text;
  sendChat();
}

function resetChat(silent) {
  if (!silent && !confirm('チャット履歴をリセットしますか？')) return;
  chatHistory = [];
  const box = document.getElementById('chat-messages');
  box.innerHTML = '';
  const msg = chatMode === 'roumu'
    ? 'こんにちは。労務・人事手続きについてサポートします。\n\n部長・課長として「次に取るべきアクション」が明確になるよう、現場と人事の役割分担を踏まえてお答えします。'
    : 'こんにちは。マネジメントトレーニングシートの内容について、何でも相談してください。\n\n60の型・心得・実践事例をもとに、具体的なアドバイスをお伝えします。';
  addMessage(msg, 'ai');
}

// ── test ──
function saveTestStats(cat, isCorrect, no, title) {
  if (!testStats[cat]) testStats[cat] = { correct: 0, total: 0 };
  testStats[cat].total++;
  if (isCorrect) {
    testStats[cat].correct++;
    weakCards = weakCards.filter(w => w.no !== no);
  } else {
    if (no && !weakCards.find(w => w.no === no)) {
      weakCards.push({ no, title, cat });
      if (weakCards.length > 20) weakCards.shift();
    }
  }
  localStorage.setItem('mgmt_test_stats', JSON.stringify(testStats));
  localStorage.setItem('mgmt_weak_cards', JSON.stringify(weakCards));
  renderTestStats();
}

function renderTestStats() {
  const catArea = document.getElementById('stat-cat-area');
  const weakArea = document.getElementById('weak-area');
  const cats = Object.entries(testStats);
  if (cats.length === 0) {
    catArea.innerHTML = '<div class="no-data">まだデータがありません</div>';
  } else {
    catArea.innerHTML = cats.map(([cat, s]) => {
      const pct = Math.round(s.correct / s.total * 100);
      return `<div class="stat-cat-row"><div class="stat-cat-name">${cat}</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%"></div></div><div class="stat-pct">${pct}%</div></div>`;
    }).join('');
  }
  if (weakCards.length === 0) {
    weakArea.innerHTML = '<div class="no-data">間違えた型が記録されます</div>';
  } else {
    weakArea.innerHTML = '<div class="weak-list">' + weakCards.slice(-6).reverse().map(w =>
      `<div class="weak-item"><span class="weak-no">${w.no||'?'}</span><span>${w.title}</span><button class="weak-retry-btn" onclick="retryWeak(${w.no},'${w.title.replace(/'/g,"\\'")}','${w.cat}')">再挑戦</button></div>`
    ).join('') + '</div>';
  }
}

function retryWeak(no, title, cat) {
  document.getElementById('test-category').value = 'weak';
  generateTestFromWeak(no, title, cat);
}

async function generateTest() {
  const cat = document.getElementById('test-category').value;
  if (cat === 'weak') {
    if (weakCards.length === 0) { alert('苦手な型はまだ記録されていません。先にテストを受けてください。'); return; }
    const w = weakCards[Math.floor(Math.random() * weakCards.length)];
    generateTestFromWeak(w.no, w.title, w.cat);
    return;
  }
  const area = document.getElementById('test-area');
  area.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:2.5rem;font-size:14px;">問題を生成中...</div>';
  answered = false;
  try {
    const raw = await callClaude([{ role: 'user', content: categoryMap[cat] + 'についての問題を1問生成してください' }], TEST_SYSTEM);
    const q = JSON.parse(raw.replace(/```json|```/g, '').trim());
    currentTest = q;
    renderTest(q);
  } catch(e) {
    area.innerHTML = '<div style="color:var(--text-3);font-size:14px;padding:1rem;text-align:center;">生成に失敗しました。再度お試しください。</div>';
  }
}

async function generateTestFromWeak(no, title, cat) {
  const area = document.getElementById('test-area');
  area.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:2.5rem;font-size:14px;">問題を生成中...</div>';
  answered = false;
  try {
    const prompt = `${no ? `型${no}.${title}` : `${cat}`}に関する4択問題を1問生成してください`;
    const raw = await callClaude([{ role: 'user', content: prompt }], TEST_SYSTEM);
    const q = JSON.parse(raw.replace(/```json|```/g, '').trim());
    currentTest = q;
    renderTest(q);
  } catch(e) {
    area.innerHTML = '<div style="color:var(--text-3);font-size:14px;padding:1rem;text-align:center;">生成に失敗しました。再度お試しください。</div>';
  }
}

function renderTest(q) {
  const area = document.getElementById('test-area');
  area.innerHTML = `
    <div class="score-row">
      <span class="score-label"><i class="ti ti-chart-bar"></i>スコア</span>
      <span class="score-val">${score} / ${total}</span>
    </div>
    <div class="test-card">
      <div class="test-cat-badge"><i class="ti ti-tag"></i>${q.category}</div>
      <div class="test-q">${q.question}</div>
      <div class="test-options">
        ${q.options.map((o, i) => `<button class="test-opt" onclick="answerTest(${i})"><span class="opt-letter">${String.fromCharCode(65+i)}</span>${o}</button>`).join('')}
      </div>
      <div id="explanation"></div>
    </div>
    <button class="next-btn" onclick="generateTest()" style="display:none;" id="next-btn"><i class="ti ti-arrow-right"></i>次の問題</button>`;
}

function answerTest(idx) {
  if (answered) return;
  answered = true;
  total++;
  const q = currentTest;
  const isCorrect = idx === q.correct;
  document.querySelectorAll('.test-opt').forEach((b, i) => {
    if (i === q.correct) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
    b.onclick = null;
  });
  if (isCorrect) score++;
  saveTestStats(q.category, isCorrect, q.no, q.question.slice(0, 20));
  document.getElementById('explanation').innerHTML = `<div class="explanation"><i class="ti ti-bulb"></i><span>${q.explanation}</span></div>`;
  document.getElementById('next-btn').style.display = 'flex';
}

// ── check ──
function renderCheckSheet() {
  let html = '';
  checkItemsList.forEach(({ cat, items }, ci) => {
    html += `<div class="check-section"><div class="check-section-title">${cat}</div>`;
    items.forEach((item, i) => {
      const key = 'c' + ci + '_i' + i;
      html += `<div class="check-item"><div class="check-text">${item}</div><div class="check-stars" id="stars_${key}">${[1,2,3,4,5].map(s => `<div class="star" onclick="setStar('${key}',${s})">${s}</div>`).join('')}</div></div>`;
    });
    html += '</div>';
  });
  html += '<div id="check-result-area"></div>';
  document.getElementById('check-area').innerHTML = html;
  renderTrend();
}

function setStar(key, val) {
  checkData[key] = val;
  document.querySelectorAll(`#stars_${key} .star`).forEach((s, i) => s.classList.toggle('on', i < val));
  renderCheckTotal();
}

function renderCheckTotal() {
  let sum = 0, answered = 0;
  checkItemsList.forEach(({ items }, ci) => {
    items.forEach((_, i) => { const v = checkData['c'+ci+'_i'+i]; if (v) { sum += v; answered++; } });
  });
  const area = document.getElementById('check-total-area');
  if (!area) return;
  if (answered === 0) { area.innerHTML = ''; return; }
  area.innerHTML = `<div class="check-total-card"><div class="check-total-label"><i class="ti ti-sum"></i>合計点（${answered}/${totalItems}項目 回答済み）</div><div class="check-total-val">${sum} <span>/ ${totalItems * 5}</span></div></div>`;
}

function saveCheckHistory() {
  let sum = 0, answered = 0;
  const catScores = {};
  checkItemsList.forEach(({ cat, items }, ci) => {
    let catSum = 0;
    items.forEach((_, i) => { const v = checkData['c'+ci+'_i'+i] || 0; catSum += v; sum += v; if (v) answered++; });
    catScores[cat] = { sum: catSum, max: items.length * 5 };
  });
  if (answered === 0) { alert('まず評価を入力してください'); return; }
  const entry = { date: new Date().toLocaleDateString('ja-JP', { month:'numeric', day:'numeric' }), total: sum, max: totalItems * 5, cats: catScores };
  checkHistory.push(entry);
  if (checkHistory.length > 10) checkHistory.shift();
  localStorage.setItem('mgmt_check_history', JSON.stringify(checkHistory));
  renderTrend();
  alert('保存しました！');
}

function renderTrend() {
  const area = document.getElementById('trend-area');
  if (!area) return;
  if (checkHistory.length < 1) { area.innerHTML = ''; return; }
  const maxTotal = totalItems * 5;
  const barMaxH = 100;
  const bars = checkHistory.map(h => {
    const pct = h.total / maxTotal;
    const barH = Math.max(8, Math.round(pct * barMaxH));
    const color = pct >= 0.8 ? 'var(--accent)' : pct >= 0.6 ? 'var(--gold)' : 'var(--red)';
    return `<div class="trend-bar-col"><div class="trend-bar-val">${h.total}</div><div class="trend-bar" style="height:${barH}px;background:${color};" title="${h.date}: ${h.total}点"></div><div class="trend-bar-date">${h.date}</div></div>`;
  }).join('');

  let deltaHtml = '';
  if (checkHistory.length >= 2) {
    const prev = checkHistory[checkHistory.length - 2];
    const curr = checkHistory[checkHistory.length - 1];
    deltaHtml = '<div class="trend-cat-grid">' + Object.entries(curr.cats).map(([cat, s]) => {
      const prevS = prev.cats[cat];
      const diff = prevS ? s.sum - prevS.sum : null;
      const cls = diff === null ? 'same' : diff > 0 ? 'up' : diff < 0 ? 'down' : 'same';
      const label = diff === null ? '初回' : diff > 0 ? `+${diff}` : diff < 0 ? `${diff}` : '±0';
      return `<div class="trend-cat-row"><span class="trend-cat-name">${cat}</span><span>${s.sum}/${s.max}</span><span class="trend-delta ${cls}">${label}</span></div>`;
    }).join('') + '</div>';
  }

  area.innerHTML = `<div class="trend-section">
    <div class="trend-title"><i class="ti ti-chart-line" style="font-size:16px;"></i>チェック結果の推移</div>
    <div class="trend-chart-wrap">
      <div class="trend-bar-group">${bars}</div>
      ${deltaHtml}
    </div>
  </div>`;
}

async function analyzeCheck() {
  if (Object.keys(checkData).length === 0) { alert('まずチェックシートに点数をつけてください'); return; }
  const resultArea = document.getElementById('check-result-area');
  resultArea.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:1.5rem;font-size:14px;">分析中...</div>';
  const summary = checkItemsList.map(({ cat, items }, ci) => {
    const scores = items.map((_, i) => checkData['c'+ci+'_i'+i] || 0);
    return `${cat}: 平均${(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1)}点（${scores.join(',')}）`;
  }).join('\n');
  try {
    const reply = await callClaude([{ role:'user', content:`心得チェック結果:\n${summary}\n\n低スコアのカテゴリを特定し具体的な改善アドバイスを300字以内で。` }], SYSTEM_PROMPT);
    resultArea.innerHTML = `<div class="check-result-card"><div class="check-result-title"><i class="ti ti-chart-radar"></i>AI分析結果</div><div style="font-size:13.5px;color:var(--text-1);line-height:1.85;">${reply.replace(/\n/g,'<br>')}</div></div>`;
  } catch(e) {
    resultArea.innerHTML = '<div style="color:var(--text-3);font-size:13px;padding:1rem;text-align:center;">分析に失敗しました。</div>';
  }
}

// ── init ──
renderTestStats();
</script>
