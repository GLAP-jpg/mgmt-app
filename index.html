<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネジメントトレーニング AIサポート</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f5f1;
  --surface: #ffffff;
  --surface-2: #f0eee7;
  --border: #e3e0d6;
  --border-strong: #cfcabb;
  --text-1: #1c1b18;
  --text-2: #5c594f;
  --text-3: #94907f;
  --accent: #2f5d4f;
  --accent-light: #e3ede9;
  --accent-dark: #1d4338;
  --gold: #b4862f;
  --gold-light: #faf2e1;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --shadow-card: 0 1px 2px rgba(28,27,24,0.04), 0 4px 16px rgba(28,27,24,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); }
body { font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; color: var(--text-1); -webkit-font-smoothing: antialiased; }

.app { max-width: 880px; margin: 0 auto; padding: 0 1.25rem 3rem; }

.header { text-align: center; padding: 3rem 1rem 2rem; }
.header .icon-badge { width: 56px; height: 56px; border-radius: 16px; background: var(--accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
.header .icon-badge i { font-size: 28px; color: #fff; }
.header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; color: var(--text-1); }
.header p { font-size: 14.5px; color: var(--text-2); line-height: 1.6; }

.mode-tabs { display: flex; gap: 6px; margin-bottom: 1.75rem; background: var(--surface-2); padding: 5px; border-radius: var(--radius-md); }
.tab { flex: 1; padding: 11px 8px; border: none; border-radius: 9px; background: transparent; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; color: var(--text-2); transition: all 0.18s ease; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; }
.tab i { font-size: 17px; }
.tab.active { background: var(--surface); color: var(--accent-dark); box-shadow: var(--shadow-card); font-weight: 700; }
.tab:hover:not(.active) { color: var(--text-1); }

.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.section-label { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.section-label i { font-size: 15px; }

.quick-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
.quick-btn { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-1); font-family: inherit; text-align: left; transition: all 0.15s ease; line-height: 1.4; }
.quick-btn:hover { border-color: var(--accent); background: var(--accent-light); transform: translateY(-1px); box-shadow: var(--shadow-card); }
.quick-btn .qicon { flex-shrink: 0; width: 30px; height: 30px; border-radius: 8px; background: var(--accent-light); color: var(--accent-dark); display: flex; align-items: center; justify-content: center; font-size: 15px; }

.chat-box { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface); box-shadow: var(--shadow-card); }
.messages { height: 440px; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

.msg { display: flex; gap: 10px; max-width: 88%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar { flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.msg.ai .msg-avatar { background: var(--accent); color: #fff; }
.msg.user .msg-avatar { background: var(--gold-light); color: var(--gold); }
.msg-bubble { padding: 11px 15px; border-radius: var(--radius-md); font-size: 14.5px; line-height: 1.75; }
.msg.user .msg-bubble { background: var(--accent); color: #fff; border-top-right-radius: 4px; }
.msg.ai .msg-bubble { background: var(--surface-2); color: var(--text-1); border-top-left-radius: 4px; }
.msg.loading .msg-bubble { color: var(--text-3); font-style: italic; display: flex; align-items: center; gap: 8px; }
.dot-flash { display: inline-flex; gap: 3px; }
.dot-flash span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); animation: dotflash 1.2s infinite ease-in-out; }
.dot-flash span:nth-child(2) { animation-delay: 0.2s; }
.dot-flash span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotflash { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }

.chat-input-row { display: flex; gap: 8px; padding: 14px; border-top: 1px solid var(--border); background: var(--surface-2); }
.chat-input-row input { flex: 1; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 14.5px; background: var(--surface); font-family: inherit; color: var(--text-1); transition: border-color 0.15s; }
.chat-input-row input:focus { outline: none; border-color: var(--accent); }
.chat-input-row input::placeholder { color: var(--text-3); }
.send-btn { width: 44px; height: 44px; border-radius: var(--radius-md); border: none; background: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; transition: background 0.15s; flex-shrink: 0; }
.send-btn:hover { background: var(--accent-dark); }
.send-btn:disabled { background: var(--border-strong); cursor: not-allowed; }

.cat-select-wrap { position: relative; margin-bottom: 12px; }
.cat-select { width: 100%; padding: 12px 40px 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); font-size: 14px; font-family: inherit; color: var(--text-1); appearance: none; cursor: pointer; }
.cat-select-wrap::after { content: '\ea5f'; font-family: 'tabler-icons'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; font-size: 16px; }

.gen-test-btn { width: 100%; padding: 13px; border: none; border-radius: var(--radius-md); background: var(--accent); cursor: pointer; font-size: 14.5px; font-weight: 700; font-family: inherit; color: #fff; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
.gen-test-btn:hover { background: var(--accent-dark); }
.gen-test-btn i { font-size: 17px; }

.test-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow-card); }
.test-cat-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700; color: var(--accent-dark); background: var(--accent-light); padding: 5px 11px; border-radius: 20px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.03em; }
.test-q { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; line-height: 1.65; color: var(--text-1); }
.test-options { display: flex; flex-direction: column; gap: 8px; }
.test-opt { display: flex; align-items: center; gap: 12px; padding: 13px 15px; border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer; font-size: 14.5px; background: var(--surface); text-align: left; transition: all 0.15s ease; font-family: inherit; color: var(--text-1); }
.test-opt:hover { background: var(--surface-2); border-color: var(--border-strong); }
.opt-letter { flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 12.5px; font-weight: 700; color: var(--text-2); }
.test-opt.correct { border-color: var(--accent); background: var(--accent-light); color: var(--accent-dark); }
.test-opt.correct .opt-letter { background: var(--accent); color: #fff; }
.test-opt.wrong { border-color: #c44; background: #fbeaea; color: #8a2e2e; }
.test-opt.wrong .opt-letter { background: #c44; color: #fff; }
.explanation { margin-top: 16px; padding: 14px 16px; background: var(--gold-light); border-radius: var(--radius-md); font-size: 13.5px; color: var(--text-1); line-height: 1.75; display: flex; gap: 10px; }
.explanation i { color: var(--gold); font-size: 18px; flex-shrink: 0; margin-top: 1px; }

.score-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 1rem; }
.score-label { font-size: 13px; color: var(--text-2); display: flex; align-items: center; gap: 6px; }
.score-val { font-size: 20px; font-weight: 700; color: var(--accent-dark); }

.check-intro { display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; background: var(--accent-light); border-radius: var(--radius-md); margin-bottom: 1.5rem; font-size: 13px; color: var(--accent-dark); line-height: 1.7; }
.check-intro i { font-size: 18px; margin-top: 1px; flex-shrink: 0; }

.check-section { margin-bottom: 1.75rem; }
.check-section-title { font-size: 14px; font-weight: 700; color: var(--text-1); padding: 0 0 10px; border-bottom: 2px solid var(--accent); margin-bottom: 12px; display: inline-block; }
.check-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; border-radius: var(--radius-md); transition: background 0.15s; }
.check-item:hover { background: var(--surface-2); }
.check-text { flex: 1; font-size: 13.5px; line-height: 1.6; color: var(--text-1); }
.check-stars { display: flex; gap: 4px; flex-shrink: 0; }
.star { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-3); background: var(--surface); transition: all 0.12s; }
.star.on { background: var(--gold); border-color: var(--gold); color: #fff; }

.check-result-card { padding: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-top: 1.25rem; box-shadow: var(--shadow-card); }
.check-result-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--accent-dark); }
.check-result-title i { font-size: 18px; }

.next-btn { width: 100%; padding: 12px; margin-top: 12px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-1); font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
.next-btn:hover { background: var(--surface-2); border-color: var(--border-strong); }

.analyze-btn { width: 100%; padding: 13px; border: none; border-radius: var(--radius-md); background: var(--accent); cursor: pointer; font-size: 14.5px; font-weight: 700; font-family: inherit; color: #fff; margin-top: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
.analyze-btn:hover { background: var(--accent-dark); }

.hero-banner { display: flex; align-items: center; gap: 1.25rem; background: var(--accent); border-radius: var(--radius-lg); padding: 1.5rem 1.75rem; margin-bottom: 1.75rem; overflow: hidden; position: relative; }
.hero-banner-text h2 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.hero-banner-text p { font-size: 12.5px; color: rgba(255,255,255,0.78); line-height: 1.6; }
.hero-banner-icon { font-size: 38px; color: rgba(255,255,255,0.9); flex-shrink: 0; }

.learn-toolbar { display: flex; gap: 10px; margin-bottom: 1.5rem; }
.learn-search-wrap { position: relative; flex: 1; }
.learn-search-wrap i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 16px; }
.learn-search-wrap input { width: 100%; padding: 12px 14px 12px 38px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text-1); }
.learn-search-wrap input:focus { outline: none; border-color: var(--accent); }

.learn-cat-group { margin-bottom: 1.75rem; }
.learn-cat-title { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.learn-cat-title .num-badge { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.learn-cat-title h3 { font-size: 15.5px; font-weight: 700; color: var(--text-1); }

.learn-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; overflow: hidden; transition: border-color 0.15s; }
.learn-card:hover { border-color: var(--border-strong); }
.learn-card-head { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; }
.learn-card-no { flex-shrink: 0; width: 32px; height: 32px; border-radius: 8px; background: var(--gold-light); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 12.5px; font-weight: 700; }
.learn-card-title { flex: 1; font-size: 14.5px; font-weight: 500; color: var(--text-1); }
.learn-card-chevron { color: var(--text-3); font-size: 16px; transition: transform 0.2s; flex-shrink: 0; }
.learn-card.open .learn-card-chevron { transform: rotate(180deg); }
.learn-card-body { display: none; padding: 0 16px 16px 60px; font-size: 13.5px; color: var(--text-2); line-height: 1.8; }
.learn-card.open .learn-card-body { display: block; }
.learn-card-actions { margin-top: 10px; }
.learn-ask-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); font-size: 12.5px; color: var(--accent-dark); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.learn-ask-btn:hover { background: var(--accent-light); border-color: var(--accent); }

.kokoroe-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 13px 16px; margin-bottom: 8px; font-size: 13.5px; color: var(--text-1); line-height: 1.7; display: flex; gap: 10px; align-items: flex-start; }
.kokoroe-card i { color: var(--accent); font-size: 16px; flex-shrink: 0; margin-top: 2px; }

.no-results { text-align: center; padding: 3rem 1rem; color: var(--text-3); font-size: 14px; }
.no-results i { font-size: 32px; display: block; margin: 0 auto 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="icon-badge"><i class="ti ti-target-arrow" aria-hidden="true"></i></div>
    <h1>マネジメントトレーニング AIサポート</h1>
    <p>60の型 × 心得チェックシートをもとに、AIが学習・相談・テストをサポートします</p>
  </div>

  <div class="mode-tabs">
    <button class="tab active" onclick="switchTab('learn', this)"><i class="ti ti-book-2" aria-hidden="true"></i>学習</button>
    <button class="tab" onclick="switchTab('consult', this)"><i class="ti ti-message-circle" aria-hidden="true"></i>AI相談</button>
    <button class="tab" onclick="switchTab('test', this)"><i class="ti ti-clipboard-check" aria-hidden="true"></i>テスト</button>
    <button class="tab" onclick="switchTab('check', this)"><i class="ti ti-checklist" aria-hidden="true"></i>心得チェック</button>
  </div>

  <div id="learn" class="panel active">
    <div class="learn-toolbar">
      <div class="cat-select-wrap" style="flex:1; margin-bottom:0;">
        <select class="cat-select" id="learn-filter" onchange="renderLearn()">
          <option value="all">すべてのカテゴリ</option>
        </select>
      </div>
      <div class="learn-search-wrap">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input type="text" id="learn-search" placeholder="型・キーワードで検索" oninput="renderLearn()" />
      </div>
    </div>
    <div id="learn-area"></div>
  </div>

  <div id="consult" class="panel">
    <div class="section-label"><i class="ti ti-bulb" aria-hidden="true"></i>よくある質問</div>
    <div class="quick-grid">
      <button class="quick-btn" onclick="quickAsk('コーチングとフィードバックの違いを教えてください')"><span class="qicon"><i class="ti ti-arrows-diff" aria-hidden="true"></i></span>コーチングとフィードバックの違い</button>
      <button class="quick-btn" onclick="quickAsk('GPKaとは何ですか？どう使いますか？')"><span class="qicon"><i class="ti ti-route" aria-hidden="true"></i></span>GPKaの使い方</button>
      <button class="quick-btn" onclick="quickAsk('権限委譲でよくある失敗パターンは？')"><span class="qicon"><i class="ti ti-alert-triangle" aria-hidden="true"></i></span>権限委譲の失敗</button>
      <button class="quick-btn" onclick="quickAsk('メンバーのWillをどうやって引き出せばいい？')"><span class="qicon"><i class="ti ti-compass" aria-hidden="true"></i></span>Willの引き出し方</button>
      <button class="quick-btn" onclick="quickAsk('野心的な目標設定の具体的な方法を教えてください')"><span class="qicon"><i class="ti ti-flag" aria-hidden="true"></i></span>野心的な目標設定</button>
      <button class="quick-btn" onclick="quickAsk('チームのモメンタムを高める方法は？')"><span class="qicon"><i class="ti ti-trending-up" aria-hidden="true"></i></span>モメンタムの高め方</button>
    </div>
    <div class="chat-box">
      <div class="messages" id="chat-messages">
        <div class="msg ai">
          <div class="msg-avatar"><i class="ti ti-target-arrow" aria-hidden="true"></i></div>
          <div class="msg-bubble">こんにちは。マネジメントトレーニングシートの内容について、何でも相談してください。<br><br>60の型・心得・実践事例をもとに、具体的なアドバイスをお伝えします。</div>
        </div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="マネジメントについて質問する..." onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="send-btn" onclick="sendChat()" aria-label="送信"><i class="ti ti-send-2" aria-hidden="true"></i></button>
      </div>
    </div>
  </div>

  <div id="test" class="panel">
    <div class="hero-banner">
      <div class="hero-banner-icon"><i class="ti ti-trophy" aria-hidden="true"></i></div>
      <div class="hero-banner-text">
        <h2>理解度をテストする</h2>
        <p>カテゴリを選んで4択問題に挑戦。間違えても解説でしっかり復習できます。</p>
      </div>
    </div>
    <div class="cat-select-wrap">
      <select class="cat-select" id="test-category">
        <option value="all">全カテゴリからランダム出題</option>
        <option value="strategy">戦略（現状認識・目標設定・方針策定）</option>
        <option value="team">チームビルディング・組織</option>
        <option value="activity">活動推進・評価</option>
        <option value="people">ピープルマネジメント</option>
        <option value="mindset">心得</option>
      </select>
    </div>
    <button class="gen-test-btn" onclick="generateTest()"><i class="ti ti-sparkles" aria-hidden="true"></i>問題を生成する</button>
    <div id="test-area"></div>
  </div>

  <div id="check" class="panel">
    <div class="check-intro">
      <i class="ti ti-info-circle" aria-hidden="true"></i>
      <span>「マネージャーの心得」の各項目について、できている度合いを1〜5で評価してください。最後にAIが弱点を分析します。</span>
    </div>
    <div id="check-area"></div>
    <button class="analyze-btn" onclick="analyzeCheck()"><i class="ti ti-chart-radar" aria-hidden="true"></i>チェック結果をAIに分析してもらう</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `あなたはマネジメントトレーニングの専門コーチです。以下のトレーニング内容を熟知しており、マネージャーへの実践的なアドバイスを日本語で提供します。

【60の型（主要内容）】
現状認識: 2.チームの役割, 3.貢献モデル, 4.上司のスタイル, 5.キャッチアップ
チーム目標設定: 6.野心的な目標(チャレンジゾーンで設定), 7.目標ゾーン, 8.状態目標(定量＋定性), 9.2種類の目標(実行力型・変革型), 10.目標の修正, 11.挑戦の評価, 12.意義(社会軸・市場軸・自者軸)

function toggleLearnCard(el) {
  el.classList.toggle('open');
}

function renderLearn() {
  const filter = document.getElementById('learn-filter').value;
  const query = document.getElementById('learn-search').value.trim().toLowerCase();
  const area = document.getElementById('learn-area');
  let html = '';
  let matchCount = 0;

  if (filter !== 'kokoroe') {
    learningData.categories.forEach((cat, ci) => {
      const filteredItems = cat.items.filter(it => {
        if (!query) return true;
        return it.title.toLowerCase().includes(query) || it.desc.toLowerCase().includes(query) || String(it.no).includes(query);
      });
      if (filteredItems.length === 0) return;
      matchCount += filteredItems.length;
      html += `<div class="learn-cat-group"><div class="learn-cat-title"><span class="num-badge">${ci+1}</span><h3>${cat.name}</h3></div>`;
      filteredItems.forEach(it => {
        html += `<div class="learn-card" id="learncard_${it.no}">
          <div class="learn-card-head" onclick="toggleLearnCard(document.getElementById('learncard_${it.no}'))">
            <div class="learn-card-no">${it.no}</div>
            <div class="learn-card-title">${it.title}</div>
            <i class="ti ti-chevron-down learn-card-chevron" aria-hidden="true"></i>
          </div>
          <div class="learn-card-body">
            ${it.desc}
            <div class="learn-card-actions">
              <button class="learn-ask-btn" onclick="event.stopPropagation(); learnAsk(${it.no}, '${it.title.replace(/'/g, "\\'")}')"><i class="ti ti-message-circle-2" aria-hidden="true"></i>AIに詳しく聞く</button>
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
    });
  }

  if (matchCount === 0) {
    html = `<div class="no-results"><i class="ti ti-search-off" aria-hidden="true"></i>該当する項目が見つかりませんでした</div>`;
  }
  area.innerHTML = html;
}

}

async function callClaude(messages, system) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, system, messages })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

  const avatarIcon = role === 'user' ? 'ti-user' : 'ti-target-arrow';
  if (role === 'loading') {
    wrap.innerHTML = `<div class="msg-avatar" style="background:var(--accent);color:#fff;"><i class="ti ti-target-arrow" aria-hidden="true"></i></div><div class="msg-bubble"><span class="dot-flash"><span></span><span></span><span></span></span></div>`;
  } else {
    wrap.innerHTML = `<div class="msg-avatar"><i class="ti ${avatarIcon}" aria-hidden="true"></i></div><div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>`;
  }
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
  return wrap;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  chatHistory.push({ role: 'user', content: text });
  const loading = addMessage('', 'loading ai');
  try {
    const reply = await callClaude(chatHistory, SYSTEM_PROMPT);
    loading.remove();
    addMessage(reply, 'ai');
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    loading.remove();
    addMessage('エラー: ' + e.message, 'ai');
  }
}

function quickAsk(text) {
  document.getElementById('chat-input').value = text;
  sendChat();
}

async function generateTest() {
  const cat = document.getElementById('test-category').value;
  const area = document.getElementById('test-area');
  area.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:3rem;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:10px;"><i class="ti ti-loader-2" style="font-size:24px;animation:spin 1s linear infinite;"></i>問題を生成中...</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
  answered = false;
  try {
    const raw = await callClaude([{ role: 'user', content: categoryMap[cat] + 'についての問題を1問生成してください' }], TEST_SYSTEM);
    const clean = raw.replace(/```json|```/g, '').trim();
    const q = JSON.parse(clean);
    currentTest = q;
    renderTest(q);
  } catch(e) {
    area.innerHTML = '<div style="color:var(--text-3);font-size:14px;padding:1rem;text-align:center;">生成に失敗しました。再度お試しください。</div>';
  }
}

function renderTest(q) {
  const area = document.getElementById('test-area');
  area.innerHTML = `
    <div class="score-row">
      <span class="score-label"><i class="ti ti-chart-bar" aria-hidden="true"></i>スコア</span>
      <span class="score-val">${score} / ${total}</span>
    </div>
    <div class="test-card">
      <div class="test-cat-badge"><i class="ti ti-tag" aria-hidden="true"></i>${q.category}</div>
      <div class="test-q">${q.question}</div>
      <div class="test-options" id="options">
        ${q.options.map((o, i) => `<button class="test-opt" onclick="answerTest(${i})"><span class="opt-letter">${String.fromCharCode(65+i)}</span>${o}</button>`).join('')}
      </div>
      <div id="explanation"></div>
    </div>
    <button class="next-btn" onclick="generateTest()" style="display:none;" id="next-btn"><i class="ti ti-arrow-right" aria-hidden="true"></i>次の問題</button>`;
}

function answerTest(idx) {
  if (answered) return;
  answered = true;
  total++;
  const q = currentTest;
  document.querySelectorAll('.test-opt').forEach((b, i) => {
    if (i === q.correct) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
    b.onclick = null;
  });
  if (idx === q.correct) score++;
  document.getElementById('explanation').innerHTML = `<div class="explanation"><i class="ti ti-bulb" aria-hidden="true"></i><span>${q.explanation}</span></div>`;
  document.getElementById('next-btn').style.display = 'flex';
}

function renderCheckSheet() {
  let html = '';
  let catIndex = 0;
  Object.entries(checkItems).forEach(([cat, items]) => {
    html += `<div class="check-section"><div class="check-section-title">${cat}</div>`;
    items.forEach((item, i) => {
      const key = 'c' + catIndex + '_i' + i;
      html += `<div class="check-item">
        <div class="check-text">${item}</div>
        <div class="check-stars" id="stars_${key}">
          ${[1,2,3,4,5].map(s => `<div class="star" onclick="setStar('${key}',${s})">${s}</div>`).join('')}
        </div>
      </div>`;
    });
    html += '</div>';
    catIndex++;
  });
  html += '<div id="check-result-area"></div>';
  document.getElementById('check-area').innerHTML = html;
}

function setStar(key, val) {
  checkData[key] = val;
  document.querySelectorAll(`#stars_${key} .star`).forEach((s, i) => {
    s.classList.toggle('on', i < val);
  });
}

async function analyzeCheck() {
  if (Object.keys(checkData).length === 0) { alert('まずチェックシートに点数をつけてください'); return; }
  const resultArea = document.getElementById('check-result-area');
  resultArea.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:2rem;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:10px;"><i class="ti ti-loader-2" style="font-size:24px;animation:spin2 1s linear infinite;"></i>分析中...</div><style>@keyframes spin2{to{transform:rotate(360deg)}}</style>';
  const summary = Object.entries(checkItems).map(([cat, items], ci) => {
    const scores = items.map((_, i) => checkData['c' + ci + '_i' + i] || 0);
    return `${cat}: 平均${(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1)}点（${scores.join(',')}）`;
  }).join('\n');
  try {
    const reply = await callClaude([{ role:'user', content:`心得チェック結果:\n${summary}\n\n低スコアのカテゴリを特定し具体的な改善アドバイスを300字以内で。` }], SYSTEM_PROMPT);
    resultArea.innerHTML = `<div class="check-result-card"><div class="check-result-title"><i class="ti ti-chart-radar" aria-hidden="true"></i>AI分析結果</div><div style="font-size:13.5px;color:var(--text-1);line-height:1.85;">${reply.replace(/\n/g,'<br>')}</div></div>`;
  } catch(e) {
    resultArea.innerHTML = '<div style="color:var(--text-3);font-size:13px;padding:1rem;text-align:center;">分析に失敗しました。</div>';
  }
}

renderLearn();

</script>
